spring:
  application:
    name: Ares
    allowedOrigins: https://ares.example.com
  main:
    allow-bean-definition-overriding: true
  jpa:
    hibernate:
      ddl-auto: none # Disable Hibernate's schema validation
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
  session:
    store-type: none
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    placeholders:
      ADMIN_EMAIL: admin@ares.com
      ADMIN_PASSWORD: password
      TEST_USER1_EMAIL: user1@ares.com
      TEST_USER1_PW: password
      TEST_USER2_EMAIL: user2@ares.com
      TEST_USER2_PW: password
      TEST_USER3_EMAIL: user3@ares.com
      TEST_USER3_PW: password
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-client-id
            client-secret: test-client-secret

app:
  frontend:
    url: http://localhost:8080
  copyright:
    start-year: 2024
user:
  password:
    min_length: 8
feed:
  interval_ms: 300000 # 5 min
  query_limit: 1000
togglz:
  features:
    SITE_MAINTENANCE:
      enabled: false
    FACEBOOK_LOGIN:
      enabled: false
    APPLE_LOGIN:
      enabled: false
    MICROSOFT_LOGIN:
      enabled: false

security:
  jwt:
    secret: aS1hbS1hLXNlY3JldC1rZXktZm9yLWFyZXMtdGhhdC1pcy1sb25nLWVub3VnaA==
    refresh_expiration_ms: 86400000 # 24 hr
    access_expiration_ms: 3600000  # 1 hour

logging:
  level:
    root: INFO
