name: Deploy Only

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Create Deployment Script
        env:
          SECRET_ENV_FILE: ${{ secrets.ENV_FILE }}
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat <<EOF > deploy.sh
          #!/bin/bash
          cd ~/ares
          
          # Create .env file from environment variable
          echo "$SECRET_ENV_FILE" > .env
          echo "IMAGE_REPO=ghcr.io/${{ env.IMAGE_NAME }}" >> .env
          
          # Login to GHCR
          echo "$SECRET_GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull and Restart
          docker compose -f prod-docker-compose.yml pull
          docker compose -f prod-docker-compose.yml up -d --remove-orphans
          docker image prune -f
          EOF
          chmod +x deploy.sh

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} "mkdir -p ~/ares"
          scp -i ~/.ssh/id_rsa prod-docker-compose.yml deploy.sh ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }}:~/ares/
          ssh -i ~/.ssh/id_rsa ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} "~/ares/deploy.sh"
