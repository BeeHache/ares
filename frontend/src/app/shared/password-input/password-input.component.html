<div class="form-group">
  <label [for]="id()">{{ label() }}:</label>
  <div class="password-wrapper">
    <input
      [type]="showPassword() ? 'text' : 'password'"
      [id]="id()"
      [name]="name()"
      [value]="value()"
      [placeholder]="placeholder()"
      [required]="required()"
      [attr.minlength]="minlength() ? minlength() : null"
      [disabled]="isDisabled()"
      (input)="onInputChange($event)"
      (blur)="onTouched()"
      (appCapsLock)="capsLockOn.set($event)"
    >
    <button type="button" class="toggle-password" (click)="toggleVisibility()" tabindex="-1">
      {{ showPassword() ? '🙈' : '👁️' }}
    </button>
  </div>
  @if (capsLockOn()) {
    <div class="caps-lock-warning">
      ⚠️ Caps Lock is on
    </div>
  }
</div>
