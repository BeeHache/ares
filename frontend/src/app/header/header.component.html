<header>
  <nav>
    <a class="brand" routerLink="/" (click)="closeMenu()">Ares</a>

    <button class="hamburger" (click)="toggleMenu()" aria-label="Toggle navigation">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <div class="nav-links" [class.active]="isMenuOpen">

      <form class="search-form" (submit)="onSearch()" *ngIf="authService.currentUser$ | async">
        <input type="text" placeholder="Search articles..." [(ngModel)]="searchQuery" name="q">
        <button type="submit">🔍</button>
      </form>

      <div class="dropdown">
        <button class="dropbtn">About</button>
        <div class="dropdown-content">
          <a routerLink="/about/licenses" (click)="closeMenu()">Licenses</a>
          <a routerLink="/about/privacy" (click)="closeMenu()">Privacy Policy</a>
        </div>
      </div>

      <ng-container *ngIf="authService.currentUser$ | async as username; else loggedOut">
        <a *ngIf="authService.hasRole('ROLE_USER')" routerLink="/feeds" class="nav-link" (click)="closeMenu()">Feeds</a>
        <a *ngIf="authService.hasRole('ROLE_ADMIN')" routerLink="/admin" class="nav-link" (click)="closeMenu()">Admin</a>

        <span class="username">
          <ng-container *ngIf="authService.hasRole('ROLE_ADMIN'); else userLink">
            {{ (authService.currentName$ | async) || username }}
          </ng-container>
          <ng-template #userLink>
            <a routerLink="/user" class="nav-link" (click)="closeMenu()">{{ username }}</a>
          </ng-template>
        </span>

        <button (click)="authService.logout(); closeMenu()" class="logout-btn">Logout</button>
      </ng-container>
      <ng-template #loggedOut>
        <a routerLink="/login" class="nav-link" (click)="closeMenu()">Login</a>
        <a routerLink="/register" class="nav-link" (click)="closeMenu()">Register</a>
      </ng-template>
    </div>
  </nav>
</header>
