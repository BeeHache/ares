<div class="feed-management-container">
  <h2>Feed Management</h2>

  @if (loading()) {
    <p>Loading feeds...</p>
  }

  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Links</th>
          <th>Pubdate</th>
          <th>Subscribers</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (feed of feeds(); track feed.id) {
          <tr>
            <td>
              <a [href]="feed.link" target="_blank" title="Website URL" class="icon-link">{{ feed.title }}</a>
            </td>
            <td>
              <a [href]="feed.url" target="_blank" title="RSS Feed URL" class="icon-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 11a9 9 0 0 1 9 9"></path>
                  <path d="M4 4a16 16 0 0 1 16 16"></path>
                  <circle cx="5" cy="19" r="1"></circle>
                </svg>
              </a>
              <a [href]="feed.link" target="_blank" title="Website URL" class="icon-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                  <polyline points="15 3 21 3 21 9"></polyline>
                  <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
              </a>
            </td>
            <td>{{ feed.pubdate | date:'short' }}</td>
            <td>{{ feed.subscribers }}</td>
            <td>
              <button (click)="refreshFeed(feed.id)" class="btn-action btn-refresh" title="Force Refresh">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M23 4v6h-6"></path>
                  <path d="M1 20v-6h6"></path>
                  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
              </button>
              <button (click)="deleteFeed(feed.id, feed.title)" class="btn-action btn-delete" title="Delete Feed">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" style="text-align: center;">No feeds found.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <button [disabled]="currentPage() === 0" (click)="loadFeeds(currentPage() - 1)">Previous</button>
    <span>Page {{ currentPage() + 1 }} of {{ totalPages() }}</span>
    <button [disabled]="currentPage() === totalPages() - 1" (click)="loadFeeds(currentPage() + 1)">Next</button>
  </div>
</div>
