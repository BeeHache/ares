<div class="feeds-page-container">
  <div class="dashboard">

    <div class="sidebar" [class.hidden]="isMobile() && !showSidebar()">
      <app-feed-list></app-feed-list>
    </div>

    <div class="main-content" [class.hidden]="isMobile() && showSidebar()">
      @if (isMobile()) {
        <div class="mobile-header">
            <button class="back-btn" (click)="backToFeedList()">← Back to Feeds</button>
        </div>
      }

      @if (iframeSrc()) {
        <iframe [src]="iframeSrc()" class="feed-items-frame"></iframe>
      } @else {
        <div class="placeholder">
            <p>Select a feed to view items.</p>
        </div>
      }
    </div>

  </div>
</div>
