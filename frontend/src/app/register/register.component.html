<div class="container">
  <h2>Register</h2>
  <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

    <app-email-input
      [ngModel]="email()"
      (ngModelChange)="email.set($event)"
      name="email"
      id="email"
      [required]="true"
    ></app-email-input>

    <app-password-input
      [ngModel]="password()"
      (ngModelChange)="password.set($event)"
      name="password"
      id="password"
      label="Password"
      [required]="true"
    ></app-password-input>

    <app-password-input
      [ngModel]="confirmPassword()"
      (ngModelChange)="confirmPassword.set($event)"
      name="confirmPassword"
      id="confirmPassword"
      label="Confirm Password"
      [required]="true"
    ></app-password-input>

    <!-- Display all validation errors -->
    @if (allErrors().length > 0) {
      <div class="error-container">
        <ul>
          @for (msg of allErrors(); track msg) {
            <li>{{ msg }}</li>
          }
        </ul>
      </div>
    }

    <div class="button-group">
      <button type="submit" [disabled]="allErrors().length > 0 || !email() || !password()">Register</button>
      <button type="button" class="cancel-btn" (click)="onCancel()">Cancel</button>
    </div>
  </form>
</div>
